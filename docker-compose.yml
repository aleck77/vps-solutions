services:
  vps-app:
    build:
      context: .
      dockerfile: Dockerfile
      # args передают переменные из .env файла в Dockerfile на этапе сборки.
      # Синтаксис: имя_ARG: ${ИМЯ_В_ENV_ФАЙЛЕ}
      # docker compose читает .env автоматически при наличии env_file или из окружения хоста.
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: vps-solutions-app
    restart: always
    env_file:
      - .env
    ports: []
    volumes:
      - ./service-account-key.json:/app/service-account-key.json:ro
      - ./public/images/vhost-logo.svg:/app/public/images/vhost-logo.svg:ro
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vps-app.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.vps-app.entrypoints=websecure"
      - "traefik.http.routers.vps-app.tls.certresolver=mytlschallenge"
      - "traefik.http.services.vps-app.loadbalancer.server.port=3000"

networks:
  n8n_default:
    external: true
    